<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl flex flex-col md:flex-row w-full max-w-4xl overflow-hidden">
    <div class="flex-1 p-8 md:p-12 flex flex-col justify-center border-b md:border-b-0 md:border-r border-gray-200">
      <div class="flex justify-center mb-6">
        <div class="w-14 h-14 bg-primary-600 rounded-xl flex items-center justify-center text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
      </div>
      <h2 class="text-2xl font-semibold text-gray-800 text-center mb-2">Bienvenue !</h2>
      <p class="text-gray-500 text-center mb-6">Connectez-vous à votre compte</p>
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input formControlName="email" type="email" class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Email" />
          <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-sm mt-1">Email invalide</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
          <input formControlName="password" type="password" class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Mot de passe" />
        </div>
        <a href="#" class="block text-sm text-primary-600 hover:underline">Mot de passe oublié ?</a>
        <p *ngIf="loginError" class="text-red-500 text-sm">{{ loginError }}</p>
        <button type="submit" class="w-full bg-primary-600 text-white py-2.5 rounded-lg font-medium hover:bg-primary-700 transition">Connexion</button>
      </form>
    </div>
    <div class="flex-1 p-8 md:p-12 flex flex-col justify-center">
      <div class="flex justify-center mb-6">
        <div class="w-14 h-14 bg-primary-600 rounded-xl flex items-center justify-center text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
        </div>
      </div>
      <h2 class="text-2xl font-semibold text-gray-800 text-center mb-2">Connectez-vous avec vos amis</h2>
      <p class="text-gray-500 text-center mb-6">Créez un compte</p>
      <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
          <input formControlName="username" type="text" class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Nom d'utilisateur" />
          <p *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="text-red-500 text-sm mt-1">Min. 2 caractères</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input formControlName="email" type="email" class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Email" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
          <input formControlName="password" type="password" class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Mot de passe (min. 6)" />
        </div>
        <p *ngIf="registerError" class="text-red-500 text-sm">{{ registerError }}</p>
        <button type="submit" class="w-full bg-primary-600 text-white py-2.5 rounded-lg font-medium hover:bg-primary-700 transition">S'inscrire</button>
      </form>
    </div>
  </div>
</div>

spring:
  application:
    name: social-network
  datasource:
    url: jdbc:postgresql://localhost:5432/social_network
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update = met à jour le schéma sans supprimer les données (ne jamais utiliser create-drop en prod)
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  # Pas de context-path : l'API est à la racine pour éviter 403 avec Spring Security
  # servlet.context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:MaCleSecreteTresLonguePourSignerLesTokensJWT123456}
    expiration-ms: 86400000
  upload-dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    com.app: DEBUG

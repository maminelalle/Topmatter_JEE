<div class="flex min-h-screen bg-gray-50">
  <!-- Sidebar -->
  <aside class="w-64 bg-sidebar text-white flex flex-col fixed left-0 top-0 h-full z-30">
    <div class="p-4 flex items-center gap-2">
      <div class="w-10 h-10 bg-primary-400 rounded-lg flex items-center justify-center font-bold text-lg">M</div>
      <span class="font-semibold">Topmatter</span>
    </div>
    <div class="px-4 pb-2">
      <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="goTo('/home')" placeholder="Rechercher..." class="w-full rounded-lg bg-white/10 text-white placeholder-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-primary-400" />
    </div>
    <nav class="flex-1 px-2 space-y-1">
      <a (click)="goTo('/home')" [class.bg-primary-500]="isActive('home')" class="flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        <span>Accueil</span>
      </a>
      <a (click)="goTo('/friends')" [class.bg-primary-500]="isActive('friends')" class="flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <span>Amis</span>
      </a>
      <a (click)="goTo('/groups')" [class.bg-primary-500]="isActive('groups')" class="flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
        <span>Groupes</span>
      </a>
      <a (click)="goTo('/messages')" [class.bg-primary-500]="isActive('messages')" class="flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
        <span>Messages</span>
      </a>
      <div class="relative">
        <a (click)="toggleNotifications()" [class.bg-primary-500]="isActive('notifications')" class="flex items-center gap-3 px-4 py-3 rounded-lg cursor-pointer hover:bg-white/10 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
          <span>Notifications</span>
          <span *ngIf="unreadCount > 0" class="ml-auto bg-red-500 text-xs text-white rounded-full w-5 h-5 flex items-center justify-center">{{ unreadCount }}</span>
        </a>
      </div>
    </nav>
    <div class="p-4 text-xs text-gray-300">Topmatter apps</div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 ml-64 flex flex-col min-h-screen">
    <!-- Top bar -->
    <header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-20">
      <input type="text" [(ngModel)]="searchQuery" placeholder="Rechercher..." class="rounded-lg border border-gray-300 px-4 py-2 w-64 focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
      <div class="flex items-center gap-4">
        <button (click)="toggleNotifications()" class="relative p-2 rounded-full hover:bg-gray-100">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
          <span *ngIf="unreadCount > 0" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <button (click)="goTo('/messages')" class="p-2 rounded-full hover:bg-gray-100">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
        </button>
        <div class="relative" (click)="$event.stopPropagation()">
          <button (click)="showUserMenu = !showUserMenu" class="flex items-center gap-2 cursor-pointer p-1 rounded-lg hover:bg-gray-100">
            <div class="w-8 h-8 rounded-full bg-primary-200 flex items-center justify-center text-primary-700 font-medium">{{ currentUser?.username?.charAt(0) || '?' }}</div>
            <span class="text-sm font-medium text-gray-700">{{ currentUser?.username }}</span>
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div *ngIf="showUserMenu" class="absolute right-0 top-full mt-1 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
            <button (click)="goTo('/friends'); showUserMenu = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Mes amis</button>
            <button (click)="logout(); showUserMenu = false" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">Déconnexion</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Notifications dropdown -->
    <div *ngIf="showNotifications" class="absolute right-6 top-16 w-96 bg-white rounded-xl shadow-lg border border-gray-200 z-50 max-h-[70vh] overflow-auto">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h3 class="font-semibold text-gray-800">Notifications</h3>
        <button (click)="showNotifications = false" class="text-gray-500 hover:text-gray-700">×</button>
      </div>
      <div class="divide-y divide-gray-100">
        <div *ngFor="let n of notifications" class="p-4 hover:bg-gray-50 flex items-start gap-3" [class.bg-primary-50]="!n.read">
          <span class="text-2xl">{{ n.type === 'LIKE' ? '❤️' : n.type === 'COMMENT' ? '💬' : n.type === 'FRIEND_REQUEST' ? '👤' : '✉️' }}</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-gray-800">{{ n.message }}</p>
            <p class="text-xs text-gray-500 mt-1">{{ n.createdAt | date:'short' }}</p>
          </div>
        </div>
        <div *ngIf="notifications.length === 0" class="p-6 text-center text-gray-500">Aucune notification</div>
      </div>
    </div>

    <main class="flex-1 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

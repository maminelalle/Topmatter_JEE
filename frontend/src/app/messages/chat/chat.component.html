<div class="max-w-4xl mx-auto h-[calc(100vh-8rem)] flex flex-col bg-gray-800 rounded-xl overflow-hidden">
  <div class="flex items-center justify-between p-4 bg-primary-900 text-white">
    <div class="flex items-center gap-3">
      <a routerLink="/messages" class="text-white hover:opacity-80">Retour</a>
      <div class="w-10 h-10 rounded-full bg-primary-600 flex items-center justify-center font-semibold">{{ otherUser?.username?.charAt(0) || '?' }}</div>
      <div>
        <p class="font-medium">{{ otherUser?.username || 'Utilisateur' }}</p>
        <p class="text-xs text-gray-300">{{ otherUser?.online ? 'En ligne' : 'Hors ligne' }}</p>
      </div>
    </div>
  </div>
  <div class="flex-1 overflow-y-auto p-4 space-y-3">
    <div *ngIf="loading" class="text-center text-gray-400">Chargement...</div>
    <div *ngFor="let msg of messages" [class.flex-row-reverse]="isFromMe(msg)" class="flex gap-2">
      <div class="w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center text-white text-sm shrink-0">{{ msg.sender?.username?.charAt(0) }}</div>
      <div [class.bg-primary-600]="isFromMe(msg)" [class.bg-gray-600]="!isFromMe(msg)" [class.ml-auto]="isFromMe(msg)" class="max-w-[70%] rounded-lg px-4 py-2 text-sm">
        <p class="text-gray-100">{{ msg.content }}</p>
        <p class="text-xs text-gray-400 mt-1">{{ msg.createdAt | date:'short' }}</p>
      </div>
    </div>
  </div>
  <div class="p-4 border-t border-gray-700 flex gap-2">
    <input [(ngModel)]="newMessage" type="text" placeholder="Ajouter un message..." class="flex-1 rounded-lg bg-gray-700 text-white placeholder-gray-400 px-4 py-2" (keyup.enter)="send()" />
    <button (click)="send()" [disabled]="!newMessage?.trim()" class="px-4 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700 disabled:opacity-50">Envoyer</button>
  </div>
</div>

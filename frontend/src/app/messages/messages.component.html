<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="p-4 border-b border-gray-200">
      <h1 class="text-xl font-semibold text-gray-800">Messages</h1>
    </div>
    <div class="divide-y divide-gray-100">
      <button *ngFor="let f of friends" (click)="openChat(f.id)" class="w-full p-4 flex items-center gap-3 hover:bg-gray-50 text-left">
        <div class="relative">
          <div class="w-12 h-12 rounded-full bg-primary-200 flex items-center justify-center text-primary-700 font-semibold">{{ f.username?.charAt(0) }}</div>
          <span *ngIf="f.online" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-medium text-gray-800">{{ f.username }}</p>
          <p class="text-sm text-gray-500">{{ f.online ? 'En ligne' : 'Hors ligne' }}</p>
        </div>
      </button>
    </div>
    <div *ngIf="loading" class="p-8 text-center text-gray-500">Chargement...</div>
    <div *ngIf="!loading && friends.length === 0" class="p-8 text-center text-gray-500">Aucune conversation. Envoyez un message à quelqu'un depuis sa page ou la liste des amis pour commencer.</div>
  </div>
</div>
